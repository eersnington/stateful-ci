name: Stateful CI
description: "Restore or save Stateful CI workspace snapshots using GitHub OIDC. Workflows must grant id-token: write and contents: read."
inputs:
  command:
    description: "Command to run: restore, save, init, deploy, or dashboard."
    required: false
    default: restore
runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
    - name: Install Stateful CI action dependencies
      shell: bash
      run: bun install --cwd "$GITHUB_ACTION_PATH" --frozen-lockfile
    - name: Run Stateful CI
      shell: bash
      env:
        STATEFUL_CI_COMMAND: ${{ inputs.command }}
      run: |
        case "$STATEFUL_CI_COMMAND" in
          restore|save|init|deploy|dashboard) ;;
          *)
            printf 'Unsupported Stateful CI command: %s\n' "$STATEFUL_CI_COMMAND" >&2
            exit 1
            ;;
        esac
        bun "$GITHUB_ACTION_PATH/packages/stateful-ci/src/cli.ts" "$STATEFUL_CI_COMMAND"
